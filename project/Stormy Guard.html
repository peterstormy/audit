  .pulse-dot { animation: pulseDot 1.8s infinite; }

  .storm-layer {
    position: absolute; inset: 0; pointer-events: none; overflow: hidden;
  }
  .storm-a {
    background:
      radial-gradient(ellipse 65% 55% at 20% 30%, hsla(217, 91%, 60%, 0.06), transparent 65%),
      radial-gradient(ellipse 60% 50% at 80% 70%, hsla(217, 91%, 60%, 0.04), transparent 65%);

  .storm-b { display: none; }
  .storm-c { display: none; }

  .storm-grid {

    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 20%, transparent 80%);

  .glass {

    box-shadow: var(--shadow-card);

  /* subtle noise */
  .noise::before {

<script type="text/babel" data-presets="env,react">

const { motion } = window.framerMotion || window.Motion || {};
const M = motion || { div: 'div', h1: 'h1', p: 'p', span: 'span', section: 'section' };

// Lucide icon helper -> renders SVG via lucide UMD
function Icon({ name, className = "", strokeWidth = 1.75, size = 16 }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!ref.current) return;
    const lib = window.lucide;
    if (!lib || !lib.icons) return;
    const key = name.replace(/(^|-)(.)/g, (_, __, c) => c.toUpperCase());
    const node = lib.icons[key] || lib.icons[name];
    if (!node) return;
    // node is array [tag, attrs, children]
    const svg = lib.createElement(node);
    svg.setAttribute("width", size);
    svg.setAttribute("height", size);
    svg.setAttribute("stroke-width", strokeWidth);
    if (className) svg.setAttribute("class", className);
    ref.current.innerHTML = "";
    ref.current.appendChild(svg);
  }, [name, className, strokeWidth, size]);
  return <span ref={ref} className="inline-flex" aria-hidden="true" />;
}

const fadeUp = (delay = 0, y = 16, duration = 0.6) => ({
  initial: { opacity: 0, y },
  animate: { opacity: 1, y: 0 },
  transition: { duration, delay, ease: [0.22, 1, 0.36, 1] },
});

          <a href="#top" className="flex items-center text-foreground shrink-0">
            <span className="font-display text-[22px] tracking-tight whitespace-nowrap">Stormy Guard</span>
          </a>
          <nav className="hidden md:flex items-center gap-7 text-sm text-muted-foreground">
            <a href="#how" className="hover:text-foreground transition-colors">How it Works</a>
            <a href="#pricing" className="hover:text-foreground transition-colors">Pricing</a>
            <a href="mailto:contact@stormyguard.com" className="hover:text-foreground transition-colors">Contact</a>
          </nav>
          <a
            href="#sg-url"

          </a>

  );
}

/* ---------------- HERO ---------------- */
function StormBackground() {
  return (
    <div aria-hidden="true" className="absolute inset-0 overflow-hidden">
      <div className="storm-layer storm-grid" />
      <div className="storm-layer storm-a" />
      <div className="storm-layer storm-b" />
      <div className="storm-layer storm-c" />
      <div className="storm-layer storm-flash" />
      {/* vignette */}
      <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,transparent_40%,hsl(var(--background))_85%)]" />
    </div>
  );
}

function ScoreRing({ score = 67, size = 96, stroke = 8 }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c * (1 - score / 100);
  return (
    <div className="relative" style={{ width: size, height: size }}>
      <svg width={size} height={size} className="-rotate-90">
        <circle cx={size/2} cy={size/2} r={r} stroke="hsl(var(--border))" strokeWidth={stroke} fill="none" />
        <circle
          cx={size/2} cy={size/2} r={r}
          stroke="#D26A56" strokeWidth={stroke} fill="none"
          strokeLinecap="round"
          strokeDasharray={c}
          strokeDashoffset={offset}
        />
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <div className="font-display text-foreground" style={{ fontSize: 28, lineHeight: 1 }}>{score}</div>
        <div className="text-[8px] text-muted-foreground tracking-wider mt-0.5">/ 100</div>
      </div>
    </div>
  );
}

// Stub for /api/audit-request—logs the payload and resolves like the future endpoint.
async function postAuditRequest(payload) {
  // eslint-disable-next-line no-console
  console.log("[POST /api/audit-request]", payload);
  window.dispatchEvent(new CustomEvent("sg:audit-request", { detail: payload }));
  await new Promise((r) => setTimeout(r, 700));
  return { ok: true, queuePosition: null };
}

function parseHost(raw) {
  const trimmed = (raw || "").trim();
  if (!trimmed) return null;
  try {
    const u = new URL(trimmed.startsWith("http") ? trimmed : `https://${trimmed}`);
    const h = u.hostname.replace(/^www\./, "");
    if (!h.includes(".") || h.length < 4) return null;
    return h + (u.pathname && u.pathname !== "/" ? u.pathname.replace(/\/$/, "") : "");
  } catch (_) {
    return null;
  }
}

function usePrefersReducedMotion() {
  const [reduced, setReduced] = React.useState(false);
  React.useEffect(() => {
    if (!window.matchMedia) return;
    const m = window.matchMedia("(prefers-reduced-motion: reduce)");
    const upd = () => setReduced(m.matches);
    upd();
    m.addEventListener ? m.addEventListener("change", upd) : m.addListener(upd);
    return () => { m.removeEventListener ? m.removeEventListener("change", upd) : m.removeListener(upd); };
  }, []);
  return reduced;
}

function ScanForm() {
  const reduced = usePrefersReducedMotion();
  const [step, setStep] = React.useState("url"); // url | details | confirm
  const [url, setUrl] = React.useState("");
  const [domain, setDomain] = React.useState("");
  const [email, setEmail] = React.useState("");
  const [notes, setNotes] = React.useState("");
  const [urlError, setUrlError] = React.useState("");
  const [emailError, setEmailError] = React.useState("");
  const [submitting, setSubmitting] = React.useState(false);
  const [announce, setAnnounce] = React.useState("");

  const urlRef = React.useRef(null);
  const emailRef = React.useRef(null);
  const calendlyRef = React.useRef(null);

  React.useEffect(() => {
    if (step === "details" && emailRef.current) emailRef.current.focus();
    if (step === "confirm" && calendlyRef.current) calendlyRef.current.focus();
  }, [step]);

  const submitUrl = (e) => {
    e.preventDefault();
    const parsed = parseHost(url);
    if (!parsed) {
      setUrlError("Please enter a valid URL (e.g., yoursite.com)");
      return;
    }
    setUrlError("");
    setDomain(parsed);
    setStep("details");
    setAnnounce(`URL confirmed: ${parsed}. Please enter your email.`);
  };

  const editUrl = () => {
    setStep("url");
    setAnnounce("Editing URL.");
    setTimeout(() => urlRef.current && urlRef.current.focus(), 30);
  };

  const submitDetails = async (e) => {
    e.preventDefault();
    const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());
    if (!valid) {
      setEmailError("Please enter a valid email address");
      return;
    }
    setEmailError("");
    setSubmitting(true);
    try {
      await postAuditRequest({ url, domain, email, notes });
    } finally {
      setSubmitting(false);
      setStep("confirm");
      setAnnounce(`Audit requested for ${domain}. Confirmation sent to ${email}.`);
    }
  };

  const reset = () => {
    setStep("url");
    setUrl(""); setDomain(""); setEmail(""); setNotes("");
    setUrlError(""); setEmailError("");
    setAnnounce("Form reset. Enter a new URL.");
    setTimeout(() => urlRef.current && urlRef.current.focus(), 30);
  };

  const onDetailsKey = (e) => {
    if (e.key === "Escape") { e.preventDefault(); editUrl(); }
  };

  const mInit = reduced ? false : { opacity: 0, y: 8 };
  const mAnim = { opacity: 1, y: 0 };
  const mT = { duration: reduced ? 0 : 0.24, ease: [0.22, 1, 0.36, 1] };

  // Same visual styling across all states (per spec): bg, border, glow.
  const containerCls =
    "relative rounded-[28px] surface focus-within:ring-1 focus-within:ring-white/10 transition";

  return (
    <div>
      <div className="sr-only" aria-live="polite" role="status">{announce}</div>

      {step === "url" && (
        <M.form
          key="url"
          onSubmit={submitUrl}
          initial={mInit} animate={mAnim} transition={mT}
          noValidate
          className={containerCls + " flex flex-col sm:flex-row items-stretch gap-2 p-1.5"}
        >
          <label htmlFor="sg-url" className="sr-only">Your website URL</label>
          <div className="flex items-center gap-2 flex-1 px-4">
            <Icon name="globe" size={15} strokeWidth={1.75} className="text-muted-foreground" />
            <input
              id="sg-url" ref={urlRef}
              type="text" inputMode="url" autoComplete="url" autoFocus={false}
              placeholder="https://yoursite.com"
              value={url}
              onChange={(e) => { setUrl(e.target.value); if (urlError) setUrlError(""); }}
              aria-invalid={!!urlError}
              aria-describedby={urlError ? "sg-url-error" : undefined}
              className="flex-1 bg-transparent outline-none text-sm md:text-[15px] text-foreground placeholder:text-muted-foreground/70 py-2.5"
            />
          </div>
          <button
            type="submit"
            className="rounded-full bg-accent text-accent-foreground font-body text-sm font-medium px-5 py-3 hover:opacity-90 transition focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent focus-visible:ring-offset-2 focus-visible:ring-offset-background"
          >
            Request Free Audit
          </button>
        </M.form>
      )}

      {step === "details" && (
        <M.form
          key="details"
          onSubmit={submitDetails}
          onKeyDown={onDetailsKey}
          initial={mInit} animate={mAnim} transition={mT}
          noValidate
          className={containerCls + " p-4 text-left"}
          aria-label="Audit request details"
        >
          <div className="flex items-center justify-between gap-3 mb-3">
            <div className="inline-flex items-center gap-2 rounded-full bg-accent/10 border border-accent/25 px-3 py-1.5 text-xs text-foreground max-w-full">
              <Icon name="check" size={12} strokeWidth={2.5} className="text-accent shrink-0" />
              <span className="font-medium font-mono whitespace-nowrap">{domain}</span>
            </div>
            <button
              type="button"
              onClick={editUrl}
              className="text-xs text-muted-foreground hover:text-foreground underline underline-offset-4 decoration-border focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent rounded-sm px-1"
            >
              Edit
            </button>
          </div>

          <label htmlFor="sg-email" className="block text-sm text-foreground mb-1.5">Where should we send your audit?</label>
          <input
            id="sg-email" ref={emailRef}
            type="email" autoComplete="email" placeholder="you@company.com"
            value={email}
            onChange={(e) => { setEmail(e.target.value); if (emailError) setEmailError(""); }}
            aria-invalid={!!emailError}
            aria-describedby={emailError ? "sg-email-error" : undefined}
            className="w-full bg-background/40 border border-border rounded-xl px-3.5 py-2.5 text-sm text-foreground placeholder:text-muted-foreground/70 outline-none focus:border-accent/60 focus:ring-2 focus:ring-accent/30 transition"
          />
          {emailError && (
            <div id="sg-email-error" role="alert" aria-live="polite" className="mt-1.5 text-xs text-amber-400">{emailError}</div>
          )}

          <label htmlFor="sg-notes" className="block text-sm text-foreground mt-3 mb-1.5">
            Anything we should know about your site? <span className="text-muted-foreground font-normal">(optional)</span>
          </label>
          <textarea
            id="sg-notes" rows={3} maxLength={500}
            placeholder="Tech stack, known issues, deadline pressure, etc."
            value={notes} onChange={(e) => setNotes(e.target.value)}
            className="w-full bg-background/40 border border-border rounded-xl px-3.5 py-2.5 text-sm text-foreground placeholder:text-muted-foreground/70 outline-none focus:border-accent/60 focus:ring-2 focus:ring-accent/30 transition resize-none"
          />
          <div className="text-[10px] text-muted-foreground mt-1 text-right tabular-nums">{notes.length}/500</div>

          <div className="mt-3 flex items-center justify-between gap-3">
            <div className="text-xs text-muted-foreground hidden sm:block">
              <kbd className="font-mono text-[10px] px-1.5 py-0.5 rounded border border-border bg-background/40">Esc</kbd> to edit URL
            </div>
            <button
              type="submit"
              disabled={submitting}
              className="rounded-full bg-accent text-accent-foreground font-body text-sm font-medium px-5 py-2.5 hover:brightness-110 transition focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent focus-visible:ring-offset-2 focus-visible:ring-offset-background disabled:opacity-80"
            >
              {submitting ? "Sending…" : "Send my audit"}
            </button>
          </div>
        </M.form>
      )}

      {step === "confirm" && (
        <M.div
          key="confirm"
          role="status"
          initial={mInit} animate={mAnim} transition={mT}
          className={containerCls + " p-6 text-left"}
          style={{
            borderColor: "rgba(34,197,94,0.32)",
            boxShadow: "0 10px 40px -10px rgba(34,197,94,0.30), 0 0 0 1px rgba(34,197,94,0.18) inset",
          }}
        >
          <div className="flex items-start gap-3">
            <div className="mt-0.5 h-7 w-7 shrink-0 rounded-full bg-[#22c55e]/15 border border-[#22c55e]/40 text-[#22c55e] flex items-center justify-center" aria-hidden="true">
              <Icon name="check" size={14} strokeWidth={2.5} />
            </div>
            <div className="flex-1 min-w-0">
              <h3 className="font-sans-display text-2xl text-foreground leading-tight">
                Got it. We’re auditing <span className="font-mono text-[1.05rem] align-middle text-accent">{domain}</span> now.
              </h3>
              <p className="text-sm text-muted-foreground mt-2 leading-relaxed">
                Your full report lands in <span className="text-foreground">{email}</span> within 24 hours. We’ll email you if we need anything from you in the meantime.
              </p>
              <div className="mt-5 flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-4">
                <a
                  ref={calendlyRef}
                  href="{{TODO: calendly-url}}"
                  target="_blank" rel="noopener noreferrer"
                  className="inline-flex items-center justify-center rounded-full bg-accent text-accent-foreground font-body text-sm font-medium px-5 py-2.5 hover:brightness-110 transition focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent focus-visible:ring-offset-2 focus-visible:ring-offset-background"
                >
                  Skip the line — book a 15-min call →
                </a>
                <button
                  type="button"
                  onClick={reset}
                  className="text-xs text-muted-foreground hover:text-foreground underline underline-offset-4 decoration-border focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent rounded-sm self-start sm:self-auto px-1 py-0.5"
                >
                  Submit another site
                </button>
              </div>
            </div>
          </div>
        </M.div>
      )}

      {step === "url" && urlError && (
        <div
          id="sg-url-error"
          role="alert" aria-live="polite"
          className="mt-2 pl-2 text-xs text-amber-400 text-left"
        >
          {urlError}
        </div>
      )}
    </div>
  );
}

function MockAuditReport() {
  const violations = [
